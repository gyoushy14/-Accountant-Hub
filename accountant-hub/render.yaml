services:
  - type: web
    name: accountant-hub-api
    env: php
    region: oregon
    plan: free
    buildCommand: composer install --optimize-autoloader --no-dev
    startCommand: php artisan migrate --force && php artisan db:seed --class=DatabaseSeeder --force && php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /api/v1/jobs
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: FRONTEND_URL
        value: https://accountant-hub.vercel.app
      - key: APP_URL
        fromService:
          type: web
          name: accountant-hub-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
